<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test After Test Simulation</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      padding: 24px;
      color: #222;
    }
    h1 { font-size: 1.2rem; margin-bottom: 4px; }
    .subtitle { font-size: 0.8rem; color: #666; margin-bottom: 16px; }

    /* Controls */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-end;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .control-group { display: flex; flex-direction: column; gap: 4px; }
    label { font-size: 0.75rem; color: #666; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
    input[type=number] {
      width: 90px;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.9rem;
    }
    input.invalid { border-color: #ef4444; background: #fff5f5; }
    .validation-msg { font-size: 0.72rem; color: #ef4444; margin-top: 2px; height: 14px; }
    .btn {
      padding: 8px 18px;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-start  { background: #22c55e; color: #fff; }
    .btn-pause  { background: #f59e0b; color: #fff; }
    .btn-reset  { background: #ef4444; color: #fff; }
    .btn:hover  { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: default; }

    /* Goal bar */
    .goal-bar-wrap {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 20px;
    }
    .goal-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 6px;
      font-size: 0.85rem;
    }
    .goal-label { font-weight: 600; color: #333; }
    .goal-pct   { font-weight: 700; font-size: 1rem; color: #15803d; }
    .goal-track {
      height: 14px;
      background: #e5e7eb;
      border-radius: 99px;
      overflow: hidden;
      position: relative;
    }
    .goal-fill {
      height: 100%;
      background: #4ade80;
      border-radius: 99px;
      transition: width 0.15s;
      min-width: 0;
    }
    .goal-target-line {
      position: absolute;
      top: 0; bottom: 0;
      width: 2px;
      background: #15803d;
      left: 80%;
    }
    .goal-target-label {
      position: absolute;
      top: -18px;
      left: 80%;
      transform: translateX(-50%);
      font-size: 0.7rem;
      font-weight: 700;
      color: #15803d;
    }

    /* Victory banner */
    .victory {
      display: none;
      background: #dcfce7;
      border: 2px solid #22c55e;
      border-radius: 8px;
      padding: 12px 20px;
      margin-bottom: 20px;
      font-weight: 700;
      color: #15803d;
      font-size: 1rem;
      text-align: center;
    }
    .victory.show { display: block; }

    /* Stats bar */
    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 20px;
      font-size: 0.9rem;
    }
    .stat { display: flex; align-items: center; gap: 6px; }
    .stat-dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      border: 2px solid rgba(0,0,0,0.2);
      flex-shrink: 0;
    }
    .stat-label { color: #555; }
    .stat-value { font-weight: 700; min-width: 24px; }
    .stat-turns { font-weight: 700; color: #333; }
    .stat-divider { width: 1px; background: #e5e7eb; align-self: stretch; }

    /* Grid */
    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
    }
    .dot {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 2px solid #ccc;
      background: #f9f9f9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      transition: background 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .dot[data-state="empty"]  { background: #f9f9f9; border-color: #ccc; }
    .dot[data-state="yellow"] { background: #fde047; border-color: #ca8a04; }
    .dot[data-state="red"]    { background: #f87171; border-color: #b91c1c; }
    .dot[data-state="green"]  { background: #4ade80; border-color: #15803d; }
    .dot[data-state="check"]  { background: #4ade80; border-color: #15803d; }
    .dot[data-state="black"]  { background: #374151; border-color: #111827; color: #9ca3af; }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.25); }
      100% { transform: scale(1); }
    }
    .dot.active { animation: pulse 0.2s ease; }

    /* Legend dot colors */
    .c-empty  { background: #f9f9f9; border-color: #ccc; }
    .c-yellow { background: #fde047; border-color: #ca8a04; }
    .c-red    { background: #f87171; border-color: #b91c1c; }
    .c-green  { background: #4ade80; border-color: #15803d; }
    .c-check  { background: #4ade80; border-color: #15803d; }
    .c-black  { background: #374151; border-color: #111827; }
  </style>
</head>
<body>
  <h1>Test After Test</h1>
  <p class="subtitle">Goal: reach 80% mastered (✓). Black dots never promote — they set the ceiling.</p>

  <div class="controls">
    <div class="control-group">
      <label>Questions (multiple of 10)</label>
      <input type="number" id="inp-count" value="50" min="10" max="500" step="10" oninput="validateCount()">
      <div class="validation-msg" id="count-msg"></div>
    </div>
    <div class="control-group">
      <label>Tick (ms)</label>
      <input type="number" id="inp-tick" value="100" min="10" max="5000">
    </div>
    <div class="control-group">
      <label>Success Rate (%)</label>
      <input type="number" id="inp-success" value="70" min="0" max="100">
    </div>
    <div class="control-group">
      <label>Green Success Rate (%)</label>
      <input type="number" id="inp-success-green" value="80" min="0" max="100">
    </div>
    <button class="btn btn-start" id="btn-start" onclick="startSim()">Start</button>
    <button class="btn btn-pause" id="btn-pause" onclick="pauseSim()" disabled>Pause</button>
    <button class="btn btn-reset" onclick="resetSim()">Reset</button>
  </div>

  <div class="goal-bar-wrap">
    <div class="goal-header">
      <span class="goal-label">Progress to 80% Mastered</span>
      <span class="goal-pct"><span id="g-pct">0</span>% of <span id="g-total">50</span> questions mastered</span>
    </div>
    <div class="goal-track">
      <div class="goal-fill" id="goal-fill" style="width:0%"></div>
      <div class="goal-target-line"></div>
      <div class="goal-target-label">80%</div>
    </div>
  </div>

  <div class="victory" id="victory">
    🎉 Goal reached! 80% mastered in <span id="v-turns">0</span> turns.
  </div>

  <div class="stats">
    <span class="stat stat-turns">Turns: <span id="s-turns">0</span></span>
    <span class="stat"><span class="stat-label">Success rate:</span><span class="stat-value" id="s-rate">—</span></span>
    <span class="stat-divider"></span>
    <span class="stat"><span class="stat-dot c-empty"></span><span class="stat-label">Empty:</span><span class="stat-value" id="s-empty">0</span></span>
    <span class="stat"><span class="stat-dot c-yellow"></span><span class="stat-label">Yellow:</span><span class="stat-value" id="s-yellow">0</span></span>
    <span class="stat"><span class="stat-dot c-red"></span><span class="stat-label">Red:</span><span class="stat-value" id="s-red">0</span></span>
    <span class="stat"><span class="stat-dot c-green"></span><span class="stat-label">Green:</span><span class="stat-value" id="s-green">0</span></span>
    <span class="stat"><span class="stat-dot c-check"></span><span class="stat-label">✓ Mastered:</span><span class="stat-value" id="s-check">0</span></span>
    <span class="stat"><span class="stat-dot c-black"></span><span class="stat-label">Black:</span><span class="stat-value" id="s-black">0</span></span>
  </div>

  <div class="grid" id="grid"></div>

  <script>
    const EMPTY  = 'empty';
    const YELLOW = 'yellow';
    const RED    = 'red';
    const GREEN  = 'green';
    const CHECK  = 'check';
    const BLACK  = 'black';

    let questions = [];
    let turns = 0;
    let successes = 0;
    let timer = null;
    let lastActive = -1;
    let goalReached = false;

    function getCount() {
      const v = parseInt(document.getElementById('inp-count').value) || 50;
      return Math.round(v / 10) * 10;
    }
    function getTick()         { return Math.max(10, parseInt(document.getElementById('inp-tick').value) || 100); }
    function getSuccess()      { return Math.min(100, Math.max(0, parseFloat(document.getElementById('inp-success').value) || 70)) / 100; }
    function getSuccessGreen() { return Math.min(100, Math.max(0, parseFloat(document.getElementById('inp-success-green').value) || 80)) / 100; }

    function validateCount() {
      const inp = document.getElementById('inp-count');
      const msg = document.getElementById('count-msg');
      const v = parseInt(inp.value);
      if (!v || v % 10 !== 0 || v < 10) {
        inp.classList.add('invalid');
        msg.textContent = 'Must be a multiple of 10';
        return false;
      }
      inp.classList.remove('invalid');
      msg.textContent = '';
      return true;
    }

    function buildGrid() {
      if (!validateCount()) return false;
      const count = getCount();

      // Composition: 20% black, 30% check, 50% empty
      const nBlack = Math.round(count * 0.2);
      const nCheck = Math.round(count * 0.3);
      const nEmpty = count - nBlack - nCheck;

      // Build shuffled array
      const states = [
        ...Array(nBlack).fill(BLACK),
        ...Array(nCheck).fill(CHECK),
        ...Array(nEmpty).fill(EMPTY),
      ];
      // Fisher-Yates shuffle
      for (let i = states.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [states[i], states[j]] = [states[j], states[i]];
      }
      questions = states;

      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      for (let i = 0; i < count; i++) {
        const el = document.createElement('div');
        el.className = 'dot';
        el.dataset.state = questions[i];
        el.id = `dot-${i}`;
        if (questions[i] === CHECK) el.textContent = '✓';
        if (questions[i] === BLACK) el.textContent = '✕';
        grid.appendChild(el);
      }

      turns = 0;
      successes = 0;
      goalReached = false;
      lastActive = -1;
      document.getElementById('victory').classList.remove('show');
      document.getElementById('g-total').textContent = count;
      updateStats();
      return true;
    }

    // State transition — black never changes; check can degrade
    function transition(state, success) {
      if (state === BLACK) return BLACK;
      if (success) {
        if (state === RED)    return YELLOW;
        if (state === EMPTY)  return GREEN;
        if (state === YELLOW) return GREEN;
        if (state === GREEN)  return CHECK;
        if (state === CHECK)  return CHECK; // already mastered, stays
      } else {
        if (state === EMPTY)  return YELLOW;
        if (state === YELLOW) return RED;
        if (state === RED)    return RED;
        if (state === GREEN)  return YELLOW;
        if (state === CHECK)  return CHECK; // mastered, never demotes
      }
      return state;
    }

    function tick() {
      // All dots are eligible (including black and check)
      const idx = Math.floor(Math.random() * questions.length);
      const state = questions[idx];
      const rate = state === GREEN ? getSuccessGreen() : getSuccess();
      // CHECK always counts as success; BLACK always counts as failure
      const success = state === CHECK ? true : state === BLACK ? false : Math.random() < rate;
      const newState = transition(state, success);
      questions[idx] = newState;
      turns++;
      if (success) successes++;

      const el = document.getElementById(`dot-${idx}`);
      el.dataset.state = newState;
      el.textContent = newState === CHECK ? '✓' : newState === BLACK ? '✕' : '';

      // Pulse
      if (lastActive >= 0) {
        const prev = document.getElementById(`dot-${lastActive}`);
        if (prev) prev.classList.remove('active');
      }
      el.classList.remove('active');
      void el.offsetWidth;
      el.classList.add('active');
      lastActive = idx;

      updateStats();
      checkGoal();
    }

    function updateStats() {
      const total = questions.length;
      const counts = { [EMPTY]: 0, [YELLOW]: 0, [RED]: 0, [GREEN]: 0, [CHECK]: 0, [BLACK]: 0 };
      for (const s of questions) counts[s]++;

      document.getElementById('s-turns').textContent  = turns;
      document.getElementById('s-rate').textContent   = turns > 0 ? (successes / turns * 100).toFixed(1) + '%' : '—';
      document.getElementById('s-empty').textContent  = counts[EMPTY];
      document.getElementById('s-yellow').textContent = counts[YELLOW];
      document.getElementById('s-red').textContent    = counts[RED];
      document.getElementById('s-green').textContent  = counts[GREEN];
      document.getElementById('s-check').textContent  = counts[CHECK];
      document.getElementById('s-black').textContent  = counts[BLACK];

      const pct = total > 0 ? (counts[CHECK] / total * 100) : 0;
      document.getElementById('g-pct').textContent = pct.toFixed(1);
      document.getElementById('goal-fill').style.width = Math.min(pct, 100) + '%';
    }

    function checkGoal() {
      if (goalReached) return;
      const total = questions.length;
      const checks = questions.filter(s => s === CHECK).length;
      if (total > 0 && checks / total >= 0.8) {
        goalReached = true;
        pauseSim();
        document.getElementById('v-turns').textContent = turns;
        document.getElementById('victory').classList.add('show');
      }
    }

    function startSim() {
      if (timer) return;
      timer = setInterval(tick, getTick());
      document.getElementById('btn-start').disabled = true;
      document.getElementById('btn-pause').disabled = false;
    }

    function pauseSim() {
      clearInterval(timer);
      timer = null;
      document.getElementById('btn-start').disabled = false;
      document.getElementById('btn-pause').disabled = true;
    }

    function resetSim() {
      pauseSim();
      buildGrid();
    }

    // Init
    buildGrid();
  </script>
</body>
</html>
